<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תשלום ארנונה</title>

<style>
  body {
    font-family: Heebo, Arial;
    background:#f6f8fb;
    margin:0;
    padding:0;
  }

  .wrap{
    max-width:900px;
    margin:auto;
  }

  /* HEADER */
  .header{
    background:#1f487c;
    color:white;
    padding:18px;
    display:flex;
    align-items:center;
    gap:18px;
  }

  .header img{
    width:70px;
    height:auto;
    border-radius:6px;
  }

  .gold{
    height:5px;
    background:#d1a000;
  }

  /* NOTICE */
  .note{
    background:#fff3c8;
    border:1px solid #ffe29b;
    color:#5a4300;
    padding:14px;
    margin:20px 0;
    border-radius:12px;
    font-weight:700;
    text-align:center;
  }

  /* CARD */
  .card{
    background:white;
    padding:22px;
    border-radius:14px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
  }

  .field{
    background:#f2f6ff;
    border:1px solid #d7e3ff;
    padding:14px;
    border-radius:12px;
    margin-bottom:16px;
  }

  .label{
    font-size:.9rem;
    color:#55627a;
  }

  .value{
    margin-top:6px;
    font-weight:800;
    font-size:1.15rem;
  }

  /* BUTTONS */
  .cta a{
    display:block;
    width:100%;
    text-align:center;
    padding:15px 0;
    border-radius:12px;
    margin:8px 0;
    font-weight:800;
    font-size:1.15rem;
    text-decoration:none;
  }

  .primary{
    background:#255bbf;
    color:white;
    box-shadow:0 4px 12px rgba(37,91,191,0.35);
    border:2px solid #1d4da0;
  }

  .secondary{
    background:white;
    border:1px solid #d0ddf5;
    color:#255bbf;
  }

  .footer{
    background:#0f2748;
    color:white;
    text-align:center;
    padding:22px;
    margin-top:30px;
    font-size:0.95rem;
