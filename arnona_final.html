<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>תשלום ארנונה</title>
<style>
body {
  font-family: Heebo, Arial;
  background:#e8f0ff;
  margin:0;
  padding:0;
  color:#0d1b2a;
}
.header {
  background:black;
  color:white;
  padding:20px;
  display:flex;
  gap:16px;
  align-items:center;
  border-bottom:6px solid #d1a000;
}
.header svg { width:80px; height:80px; }
.card {
  background:white;
  padding:20px;
  margin:20px;
  border-radius:12px;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
}
.field {
  background:#f2f6ff;
  border:1px solid #d7e3ff;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}
.label { color:#55627a; font-size:14px; }
.value { font-weight:800; font-size:18px; margin-top:4px; }
.primary {
  display:block;
  text-align:center;
  padding:14px;
  margin:12px 0;
  background:#255bbf;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
<svg viewBox="0 0 64 64">
<rect x="6" y="6" width="52" height="52" rx="8" fill="#0a3f86" stroke="#d1a000" stroke-width="3"/>
<path d="M32 18c4 0 7 3 7 7c2 1 4 3 4 6c0 4-3 7-6 7h-2l-1 4h-6l-1-4h-2c-3 0-6-3-6-7c0-3 2-5 4-6c0-4 3-7 7-7z" fill="#d1a000"/>
</svg>
<div>
<b>מחלקת אכיפה — עיריית ירושלים</b><br>
<small>תשלום ארנונה</small>
</div>
</div>

<div class="card">
<div class="field"><div class="label">שם תושב</div><div id="name" class="value"></div></div>
<div class="field"><div class="label">חשבון ארנונה</div><div id="account" class="value"></div></div>
<div class="field"><div class="label">כתובת</div><div id="address" class="value"></div></div>
<div class="field"><div class="label">יתרת חוב</div><div id="balance" class="value" style="color:#b71c1c;"></div></div>

<a id="paybtn" class="primary" target="_blank">💳 לתשלום עכשיו</a>
<a href="tel:02-6293333" class="primary" style="background:#333;">☎ מעבר לנציג — 02‑6293333</a>
</div>

<script>
const url = new URL(window.location.href);
const val = (x) => url.searchParams.get(x) || "";
document.getElementById("name").textContent = val("name");
document.getElementById("account").textContent = val("account");
document.getElementById("address").textContent = val("address");
document.getElementById("balance").textContent = val("balance");
document.getElementById("paybtn").href = val("pay");
</script>

</body>
</html>
``
