<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>תשלום ארנונה</title>

<style>

/* ===== בסיס ===== */
body{
  font-family:Heebo,Arial;
  background:#f0f3f7;
  margin:0;
  padding:0;
  color:#0d1b2a;
}
.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* ===== HEADER ===== */
.header{
  background:#0F3A5F;
  color:white;
  padding:20px;
  display:flex;
  align-items:center;
  gap:20px;
  border-bottom:6px solid #F2A900;
  border-radius:0 0 12px 12px;
  position:relative;
}

/* ✅ לוגו אמיתי */
.header img{
  width:165px;
  height:auto;
  filter:brightness(0) invert(1);
}

/* ✅ כותרת מיושרת מרכז */
.header-title{
  flex:1;
  text-align:center;
  line-height:1.22;
  padding-left:50px; /* מפצה על רוחב הלוגו */
}

/* ===== NOTE ===== */
.note{
  background:#fff3c8;
  border:1px solid #ffe29b;
  padding:14px;
  margin:22px 0;
  border-radius:12px;
  text-align:center;
  font-weight:700;
}

/* ===== CARD ===== */
.card{
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
  overflow:hidden; /* ✅ מונע בליטה */
}

/* ===== FIELDS ===== */
.field{
  background:#f2f6ff;
  border:1px solid #d7e3ff;
  padding:14px;
  border-radius:12px;
  margin-bottom:14px;
}
.label{font-size:0.9rem;color:#55627a;}
.value{margin-top:4px;font-weight:800;font-size:1.2rem;}

/* ===== BUTTONS ===== */
.buttons{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  padding:0 4px; /* ✅ prevents left overflow */
}

.btn{
  display:block;
  width:100%;
  padding:15px;
  text-align:center;
  border-radius:12px;
  font-weight:800;
  font-size:1.15rem;
  text-decoration:none;
  box-sizing:border-box;
}

/* ✅ ירוק */
.btn-pay{
  background:#1fa548;
  color:white;
  border:2px solid #17853a;
}
.btn-pay span{
  display:inline-block;
  margin-right:6px;
  transition:0.3s;
}
.btn-pay:hover span{
  transform:translateX(8px);
}

/* ✅ לבנים */
.btn-white{
  background:white;
  border:1px solid #d7e3ff;
  color:#1D3354;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* ===== FOOTER ===== */
.footer{
  background:#0F2748;
  color:white;
  padding:24px;
  text-align:center;
  margin-top:32px;
  border-radius:12px;
  font-size:1.05rem;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- ===== HEADER ===== -->
  <div class="header">

    <!-- ✅ לוגו אמיתי ולא טקסט -->
    <a href="https://www.jerusalem.muni.il" target="_blank">
      <img src="https://www.jerusalem.muni.il/images/logo-new2.svg" alt="לוגו עיריית ירושלים">
    </a>

    <!-- ✅ כותרת ממורכזת -->
    <div class="header-title">
      <b style="font-size:1.4rem;">מחלקת אכיפה — עיריית ירושלים</b><br>
      <small>תשלום ארנונה</small>
    </div>

  </div>

  <!-- ===== CARD ===== -->
  <div class="card">

    <div class="note">⚠️ תזכורת לפני נקיטת הליכי אכיפה</div>

    <div class="field"><div class="label">שם תושב</div><div id="name" class="value"></div></div>
    <div class="field"><div class="label">מס' חשבון ארנונה</div><div id="account" class="value"></div></div>
    <div class="field"><div class="label">כתובת</div><div id="address" class="value"></div></div>
    <div class="field"><div class="label">גובה החוב (₪)</div><div id="balance" class="value" style="color:#b71c1c;"></div></div>

    <div class="buttons">

      <!-- ✅ תשלום -->
      <a id="paybtn" class="btn btn-pay" target="_blank">
        <span>💳</span> לתשלום עכשיו
      </a>

      <!-- ✅ פירוט חשבון מלא -->
      <a href="https://jeronlineforms.jerusalem.muni.il/ArnonaBalanceApproval"
         class="btn btn-white" target="_blank">
        📄 פירוט חשבון מלא
      </a>

      <!-- ✅ מעבר לנציג -->
      <a href="tel:026293333" class="btn btn-white">
        ☎ מעבר לנציג
      </a>

      <!-- ✅ ArnonaBot -->
      <a id="wa" class="btn btn-white" target="_blank">
        🤖 ArnonaBot
      </a>

    </div>

  </div>

  <div class="footer">
    אגף לשירות ופניות ארנונה<br>
    עיריית ירושלים
  </div>

</div>

<script>
const p=new URL(location.href).searchParams;
document.getElementById("name").textContent=p.get("name")||"";
document.getElementById("account").textContent=p.get("account")||"";
document.getElementById("address").textContent=p.get("address")||"";
document.getElementById("balance").textContent=p.get("balance")||"";
document.getElementById("paybtn").href=p.get("pay")||"#";
document.getElementById("wa").href="https://wa.me/972559597593?text=שלום "+encodeURIComponent(p.get("name")||"");
</script>

</body>
</html>
